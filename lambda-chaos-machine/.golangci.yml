version: "2"
run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  go: "1.25.8"
linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - gocheckcompilerdirectives
    - gochecknoinits
    - gochecksumtype
    - gocritic
    - gomoddirectives
    - gosec
    - govet
    - ineffassign
    - makezero
    - mnd
    - unparam
    - wsl_v5
    - staticcheck
    - revive
  settings:
    errcheck:
      check-type-assertions: true
    exhaustive:
      check:
        - switch
        - map
    gocritic:
      enabled-checks:
        - dupBranchBody
        - dupCase
        - dupSubExpr
        - captLocal
        - unnamedResult
        - unnecessaryBlock
        - paramTypeCombine
        - appendCombine
        - rangeValCopy
    govet:
      disable:
        - fieldalignment
      enable-all: true
      settings:
        shadow:
          strict: true
    mnd:
      ignored-numbers:
        - '0'
        - '1'
        - '2'
        - '3'
        - '5'
        - '10'
        - '60'
        - '100'
        - '256'
        - '512'
        - '1024'
      ignored-functions:
        - assert.*
        - require.*
        - make
        - cap
        - len
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign
    staticcheck:
      checks: ["all"]
    revive:
      confidence: 0.8
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          arguments:
            - "checkPrivateReceivers"
            - "disableStutteringCheck"
        - name: var-naming
          arguments:
            - ["ID", "URL", "HTTP", "JSON", "API", "URI", "MCP", "AWS", "TTL", "IAM", "ARN"]
        - name: package-comments
        - name: unused-parameter
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gochecknoinits
        path: (^|/)main\.go
      - linters:
          - gochecknoinits
        path: ^cmd/.*/main\.go
      - linters:
          - wsl_v5
        path: _test\.go
      - linters:
          - revive
        path: _test\.go
        text: "unused-parameter:"
      - linters:
          - govet
        path: _test\.go
        text: "shadow: declaration of"
      - linters:
          - staticcheck
        path: _test\.go
        text: "SA9003:"
issues:
  max-same-issues: 50
  max-issues-per-linter: 50
  fix: false
formatters:
  enable:
    - gofumpt
  exclusions:
    generated: lax